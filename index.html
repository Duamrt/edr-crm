<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDR CRM — Login</title>
  <link rel="stylesheet" href="css/style.css?cb=1778673003">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <h1>EDR CRM</h1>
        <p>Gestão MCMV — MCMV</p>
      </div>

      <div id="login-erro" class="login-erro hidden"></div>

      <form id="form-login">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="btn-entrar">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <div id="loading" class="hidden">
    <div class="spinner"></div>
  </div>

  <script src="js/supabase.js?cb=1778673003"></script>
  <script src="js/auth.js?cb=1778673003"></script>
  <script>
    // Se já está logado, redirecionar
    const s = sessionGet()
    if (s) { setToken(s.token); window.location.replace('clientes.html') }

    document.getElementById('form-login').addEventListener('submit', async function(e) {
      e.preventDefault()
      const email = document.getElementById('email').value.trim()
      const senha = document.getElementById('senha').value
      const erro = document.getElementById('login-erro')
      const btn = document.getElementById('btn-entrar')

      erro.classList.add('hidden')
      btn.disabled = true
      btn.textContent = 'Entrando...'
      showLoading()

      try {
        await login(email, senha)
        window.location.replace('clientes.html')
      } catch (err) {
        erro.textContent = err.message || 'E-mail ou senha inválidos'
        erro.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Entrar'
        hideLoading()
      }
    })

    function showLoading() { document.getElementById('loading').classList.remove('hidden') }
    function hideLoading() { document.getElementById('loading').classList.add('hidden') }
  </script>
  <script src="js/sw-register.js?cb=1778673003"></script>
</body>
</html>
