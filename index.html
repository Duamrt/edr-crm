<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>EDR CRM — Login</title>
  <link rel="stylesheet" href="css/tokens.css?cb=1779015107">
  <link rel="stylesheet" href="css/style.css?cb=1779015107">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <h1>EDR CRM</h1>
        <p>Gestão MCMV — MCMV</p>
      </div>

      <div id="login-erro" class="login-erro hidden"></div>

      <form id="form-login">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="btn-entrar">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <div id="loading" class="hidden">
    <div class="spinner"></div>
  </div>

  <script src="js/supabase.js?cb=1779015107"></script>
  <script src="js/auth.js?cb=1779015107"></script>
  <script src="js/utils.js?cb=1779015107"></script>
  <script>
    // Se já está logado, redirecionar
    const s = sessionGet()
    if (s) { setToken(s.token); window.location.replace('dashboard.html') }

    document.getElementById('form-login').addEventListener('submit', async function(e) {
      e.preventDefault()
      const email = document.getElementById('email').value.trim()
      const senha = document.getElementById('senha').value
      const erro = document.getElementById('login-erro')
      const btn = document.getElementById('btn-entrar')

      erro.classList.add('hidden')
      btn.disabled = true
      btn.textContent = 'Entrando...'
      showLoading()

      try {
        await login(email, senha)
        window.location.replace('dashboard.html')
      } catch (err) {
        // Produto interno (~3 usuários) — diferencia email vs senha pra reduzir fricção (COPY02)
        const msg = (err.message || '').toLowerCase()
        let mensagemFinal
        if (msg.includes('invalid_credentials') || msg.includes('invalid login')) {
          // Distinção sem expor enum de usuários: detecta padrão de email malformado
          if (!email.includes('@') || !email.includes('.')) {
            mensagemFinal = 'E-mail mal formatado. Tem que ter @ e domínio.'
          } else if (senha.length < 4) {
            mensagemFinal = 'Senha muito curta — confere se digitou ela inteira.'
          } else {
            mensagemFinal = 'E-mail ou senha não conferem. Verifica e tenta de novo.'
          }
        } else if (typeof traduzirErro === 'function') {
          mensagemFinal = traduzirErro(err)
        } else {
          mensagemFinal = err.message || 'Erro ao entrar.'
        }
        erro.textContent = mensagemFinal
        erro.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Entrar'
        hideLoading()
      }
    })

    function showLoading() { document.getElementById('loading').classList.remove('hidden') }
    function hideLoading() { document.getElementById('loading').classList.add('hidden') }
  </script>
  <script src="js/sw-register.js?cb=1779015107"></script>
</body>
</html>
