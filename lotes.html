<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>EDR CRM — Lotes MCMV</title>
  <link rel="stylesheet" href="css/style.css?cb=1778772285">
  <link rel="prefetch" href="clientes.html">
  <link rel="prefetch" href="kanban.html">
  <link rel="preload" href="img/mapa-lotes.jpg" as="image">
  <script>document.documentElement.style.visibility = 'hidden'</script>
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar">
      <div class="sidebar-logo"><div class="logo-title">EDR CRM</div><div class="logo-sub">Gestão MCMV</div></div>
      <div class="sidebar-nav">
        <a href="clientes.html">👥 Famílias</a>
        <a href="kanban.html">📋 Kanban</a>
        <a href="lotes.html" class="active">🏘️ Lotes</a>
      </div>
      <div class="sidebar-footer"><div id="sidebar-usuario"></div><div id="crm-versao-footer" class="crm-versao"></div></div>
    </nav>

    <div class="main">
      <div class="topbar">
        <span class="topbar-title">Lotes — MCMV</span>
        <div style="display:flex;align-items:center;gap:12px;">
          <div id="contador-lotes" class="text-sm text-muted"></div>
          <button id="btn-ajustar" class="btn btn-secondary" onclick="toggleEditMode()" style="font-size:.8rem;padding:4px 10px;">⚙️ Ajustar</button>
        </div>
      </div>

      <div class="page-content">

        <!-- Legenda -->
        <div class="flex gap-8 mb-16" style="flex-wrap:wrap;align-items:center;">
          <span style="display:flex;align-items:center;gap:5px;font-size:.82rem;"><span style="display:inline-block;width:14px;height:14px;background:#22c55e;border-radius:50%;opacity:.85;"></span>Disponível</span>
          <span style="display:flex;align-items:center;gap:5px;font-size:.82rem;"><span style="display:inline-block;width:14px;height:14px;background:#f59e0b;border-radius:50%;opacity:.85;"></span>Reservado</span>
          <span style="display:flex;align-items:center;gap:5px;font-size:.82rem;"><span style="display:inline-block;width:14px;height:14px;background:#6b7280;border-radius:50%;opacity:.85;"></span>Vendido</span>
          <span style="display:flex;align-items:center;gap:5px;font-size:.82rem;"><span style="display:inline-block;width:14px;height:14px;background:#ef4444;border-radius:50%;opacity:.85;"></span>Bloqueado</span>
        </div>

        <!-- Mapa SVG interativo -->
        <div style="overflow-x:auto;background:#1f2937;border-radius:12px;padding:4px;">
          <svg id="mapa-svg" viewBox="0 0 1000 562"
               style="width:100%;min-width:600px;display:block;border-radius:10px;"
               xmlns="http://www.w3.org/2000/svg">
            <!-- renderizado pelo JS -->
          </svg>
        </div>

        <!-- Modal detalhe lote -->
        <div id="modal-lote" class="modal-overlay hidden">
          <div class="modal">
            <div class="modal-header">
              <h3 id="modal-lote-title">Lote</h3>
              <button class="modal-close" onclick="fecharModal()">✕</button>
            </div>
            <div class="modal-body">
              <div id="modal-lote-body"></div>
            </div>
            <div class="modal-footer">
              <button onclick="fecharModal()" class="btn btn-secondary">Fechar</button>
              <button id="modal-btn-editar" class="btn btn-secondary" onclick="abrirEdicao()">✏️ Editar</button>
              <a href="#" id="modal-btn-cliente" class="btn btn-primary hidden">Ver família</a>
              <button id="modal-btn-bloquear" class="btn btn-danger hidden" onclick="toggleBloquear()">Bloquear lote</button>
            </div>
          </div>
        </div>

        <!-- Modal edição lote -->
        <div id="modal-editar-lote" class="modal-overlay hidden">
          <div class="modal">
            <div class="modal-header">
              <h3>Editar lote</h3>
              <button class="modal-close" onclick="fecharEdicao()">✕</button>
            </div>
            <div class="modal-body">
              <div class="form-grid">
                <div class="form-group">
                  <label>Número</label>
                  <input type="number" id="edit-numero" min="1">
                </div>
                <div class="form-group">
                  <label>Metragem (m²)</label>
                  <input type="number" id="edit-metragem" min="0" step="0.01">
                </div>
                <div class="form-group">
                  <label>Quadra</label>
                  <input type="text" id="edit-quadra" maxlength="10">
                </div>
                <div class="form-group">
                  <label>Status manual</label>
                  <select id="edit-status">
                    <option value="disponivel">Disponível</option>
                    <option value="bloqueado">Bloqueado</option>
                  </select>
                </div>
                <div class="form-group form-full">
                  <label>Observação</label>
                  <input type="text" id="edit-observacao" maxlength="100">
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button onclick="fecharEdicao()" class="btn btn-secondary">Cancelar</button>
              <button onclick="salvarEdicao()" class="btn btn-primary">Salvar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="loading" class="hidden"><div class="spinner"></div></div>

  <script src="js/supabase.js?cb=1778772285"></script>
  <script src="js/auth.js?cb=1778772285"></script>
  <script src="js/utils.js?cb=1778772285"></script>
  <script>
    if (!authGuard()) throw new Error('not auth')
    document.documentElement.style.visibility = ''

    const u = getUsuario()
    document.getElementById('sidebar-usuario').textContent = u?.nome || u?.email || ''

    let _lotes = []
    let _loteAtual = null
    let _editMode = false
    let _drag = null

    const _DEFAULT_POS = {
      A: [{cx:213,cy:207},{cx:256,cy:207},{cx:298,cy:207},{cx:341,cy:207},{cx:384,cy:207},
          {cx:426,cy:207},{cx:469,cy:207},{cx:512,cy:207},{cx:554,cy:207},{cx:597,cy:207},
          {cx:640,cy:207},{cx:682,cy:207},{cx:725,cy:207},{cx:768,cy:207},{cx:810,cy:207},
          {cx:853,cy:207},{cx:895,cy:207}],
      B: [{cx:440,cy:402},{cx:486,cy:402},{cx:531,cy:402},{cx:577,cy:402},{cx:622,cy:402},
          {cx:668,cy:402},{cx:713,cy:402},{cx:759,cy:402},{cx:804,cy:402},{cx:850,cy:402},{cx:895,cy:402}]
    }

    let _pos = JSON.parse(JSON.stringify(_DEFAULT_POS))

    async function loadPos() {
      try {
        const r = await fetch(`${SUPABASE_URL}/rest/v1/crm_config?chave=eq.lotes_posicoes&select=valor`, { headers: _headers() })
        if (r.ok) {
          const data = await r.json()
          if (data[0]?.valor) {
            _pos = data[0].valor
            localStorage.setItem('edr_lotes_pos', JSON.stringify(_pos))
            return
          }
        }
      } catch(e) { console.warn('loadPos DB error, usando localStorage:', e) }
      const cached = localStorage.getItem('edr_lotes_pos')
      if (cached) try { _pos = JSON.parse(cached) } catch {}
    }

    async function savePos() {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/crm_config?chave=eq.lotes_posicoes`, {
          method: 'PATCH',
          headers: { ..._headers(), 'Prefer': 'return=minimal' },
          body: JSON.stringify({ valor: _pos, updated_at: new Date().toISOString() })
        })
        localStorage.setItem('edr_lotes_pos', JSON.stringify(_pos))
      } catch(e) {
        localStorage.setItem('edr_lotes_pos', JSON.stringify(_pos))
        console.warn('savePos fallback localStorage:', e)
      }
    }

    // Drag via setPointerCapture — captura todos os eventos mesmo fora do círculo
    function initDrag() {
      const svg = document.getElementById('mapa-svg')

      svg.addEventListener('pointerdown', e => {
        if (!_editMode) return
        const g = e.target.closest('g[data-q]')
        if (!g) return
        e.preventDefault()
        svg.setPointerCapture(e.pointerId)
        const rect = svg.getBoundingClientRect()
        const q = g.dataset.q, i = parseInt(g.dataset.i)
        _drag = {
          q, i,
          scaleX: 1000 / rect.width,
          scaleY: 562 / rect.height,
          startX: e.clientX, startY: e.clientY,
          origCX: _pos[q][i].cx, origCY: _pos[q][i].cy
        }
      })

      svg.addEventListener('pointermove', e => {
        if (!_drag) return
        const cx = Math.round(_drag.origCX + (e.clientX - _drag.startX) * _drag.scaleX)
        const cy = Math.round(_drag.origCY + (e.clientY - _drag.startY) * _drag.scaleY)
        _pos[_drag.q][_drag.i] = { cx, cy }
        const g = svg.querySelector(`g[data-q="${_drag.q}"][data-i="${_drag.i}"]`)
        if (!g) return
        g.querySelector('circle').setAttribute('cx', cx)
        g.querySelector('circle').setAttribute('cy', cy)
        g.querySelectorAll('text').forEach(t => t.setAttribute('x', cx))
      })

      svg.addEventListener('pointerup', () => { if (_drag) savePos(); _drag = null })
      svg.addEventListener('pointercancel', () => { _drag = null })
    }

    async function toggleEditMode() {
      _editMode = !_editMode
      const btn = document.getElementById('btn-ajustar')
      if (_editMode) {
        btn.textContent = '✓ Salvar'
        btn.className = 'btn btn-primary'
        toast('Arraste os marcadores para posicionar', 'info')
      } else {
        btn.textContent = '⚙️ Ajustar'
        btn.className = 'btn btn-secondary'
        await savePos()
        toast('Posições salvas', 'success')
      }
      renderLotes()
    }

    async function carregar() {
      showLoading()
      try {
        await loadPos()
        const [lotes, clientes] = await Promise.all([
          sbGet('crm_lotes', '?order=quadra.asc,numero.asc&select=*'),
          sbGet('crm_clientes', '?deleted_at=is.null&lote_id=not.is.null&select=id,nome,lote_id,status_kanban')
        ])
        const clienteMap = {}
        clientes.forEach(c => { clienteMap[c.lote_id] = c })
        _lotes = lotes.map(l => {
          const cliente = clienteMap[l.id]
          let statusReal = l.status
          if (cliente) statusReal = cliente.status_kanban === 'concluido' ? 'vendido' : 'reservado'
          return { ...l, statusReal, cliente }
        })
        renderLotes()
        atualizarContador()
        initDrag()
      } catch (err) { toast('Erro: ' + err.message, 'error') }
      hideLoading()
    }

    function renderLotes() {
      const quadraA = _lotes.filter(l => l.quadra === 'A').sort((a, b) => a.numero - b.numero)
      const quadraB = _lotes.filter(l => l.quadra === 'B').sort((a, b) => a.numero - b.numero)
      const CORES = { disponivel: '#22c55e', reservado: '#f59e0b', vendido: '#6b7280', bloqueado: '#ef4444' }

      function badge(lote, pos, q, i) {
        const { cx, cy } = pos
        const cor = CORES[lote.statusReal] || '#94a3b8'
        const label = `${q}${lote.numero}`
        const nomeAbrev = lote.cliente ? lote.cliente.nome.split(' ')[0].substring(0, 6) : ''
        if (_editMode) {
          return `<g data-q="${q}" data-i="${i}" style="cursor:grab">
            <circle cx="${cx}" cy="${cy}" r="12" fill="${cor}" opacity="0.75" stroke="white" stroke-width="1.5"/>
            <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
                  fill="white" font-size="8" font-weight="700" font-family="sans-serif"
                  pointer-events="none">${label}</text>
          </g>`
        }
        return `<g onclick="abrirLote('${lote.id}')" style="cursor:pointer"
          onmouseover="this.querySelector('circle').setAttribute('r','15');this.querySelector('circle').setAttribute('opacity','1')"
          onmouseout="this.querySelector('circle').setAttribute('r','12');this.querySelector('circle').setAttribute('opacity','0.90')">
          <circle cx="${cx}" cy="${cy}" r="12" fill="${cor}" opacity="0.90"/>
          <text x="${cx}" y="${nomeAbrev ? cy - 3 : cy}" text-anchor="middle" dominant-baseline="middle"
                fill="white" font-size="8" font-weight="700" font-family="sans-serif"
                pointer-events="none">${label}</text>
          ${nomeAbrev ? `<text x="${cx}" y="${cy + 6}" text-anchor="middle" dominant-baseline="middle"
                fill="rgba(255,255,255,.85)" font-size="6.5" font-family="sans-serif"
                pointer-events="none">${nomeAbrev}</text>` : ''}
        </g>`
      }

      let s = `<image href="img/mapa-lotes.jpg?v=${CRM_VERSION}" x="0" y="0" width="1000" height="562" preserveAspectRatio="xMidYMid meet"/>`
      quadraA.forEach((lote, i) => { s += badge(lote, _pos.A[i] || {cx:500,cy:207}, 'A', i) })
      quadraB.forEach((lote, i) => { s += badge(lote, _pos.B[i] || {cx:700,cy:402}, 'B', i) })
      document.getElementById('mapa-svg').innerHTML = s
    }

    function atualizarContador() {
      const disp   = _lotes.filter(l => l.statusReal === 'disponivel').length
      const reserv = _lotes.filter(l => l.statusReal === 'reservado').length
      const vend   = _lotes.filter(l => l.statusReal === 'vendido').length
      document.getElementById('contador-lotes').innerHTML =
        `<strong>${disp}</strong> disponíveis · <strong>${reserv}</strong> reservados · <strong>${vend}</strong> vendidos`
    }

    function abrirLote(id) {
      _loteAtual = _lotes.find(l => l.id === id)
      if (!_loteAtual) return

      document.getElementById('modal-lote-title').textContent =
        `Lote ${_loteAtual.numero} — Quadra ${_loteAtual.quadra || '?'}`

      const c = _loteAtual.cliente
      document.getElementById('modal-lote-body').innerHTML = `
        <div class="form-grid" style="gap:8px 16px;">
          <div><span class="text-sm text-muted">Metragem</span><br><strong>${_loteAtual.metragem || '?'}m²</strong></div>
          <div><span class="text-sm text-muted">Quadra</span><br><strong>${_loteAtual.quadra || '?'}</strong></div>
          <div><span class="text-sm text-muted">Status</span><br><span class="badge status-${_loteAtual.statusReal === 'reservado' ? 'correspondente' : _loteAtual.statusReal === 'vendido' ? 'concluido' : _loteAtual.statusReal === 'bloqueado' ? 'perdido' : 'triagem'}">${_loteAtual.statusReal}</span></div>
          ${_loteAtual.observacao ? `<div class="form-full"><span class="text-sm text-muted">Observação</span><br>${_loteAtual.observacao}</div>` : ''}
        </div>
        ${c ? `<div class="card" style="margin-top:12px;background:#f9fafb;">
          <div class="text-sm text-muted mb-8">Família vinculada</div>
          <strong>${c.nome}</strong>
          <div class="text-sm"><span class="badge status-${c.status_kanban}">${KANBAN_LABEL[c.status_kanban]}</span></div>
        </div>` : '<p class="text-muted mt-8">Nenhuma família vinculada.</p>'}
      `

      const btnCliente = document.getElementById('modal-btn-cliente')
      if (c) {
        btnCliente.href = `ficha.html?id=${c.id}`
        btnCliente.classList.remove('hidden')
      } else {
        btnCliente.classList.add('hidden')
      }

      const btnBloquear = document.getElementById('modal-btn-bloquear')
      if (_loteAtual.statusReal === 'disponivel') {
        btnBloquear.classList.remove('hidden')
        btnBloquear.textContent = 'Bloquear lote'
      } else if (_loteAtual.status === 'bloqueado' && !c) {
        btnBloquear.classList.remove('hidden')
        btnBloquear.textContent = 'Desbloquear lote'
      } else {
        btnBloquear.classList.add('hidden')
      }

      document.getElementById('modal-lote').classList.remove('hidden')
    }

    async function toggleBloquear() {
      if (!_loteAtual) return
      const novoStatus = _loteAtual.status === 'bloqueado' ? 'disponivel' : 'bloqueado'
      try {
        await sbPatch('crm_lotes', _loteAtual.id, { status: novoStatus })
        toast(novoStatus === 'bloqueado' ? 'Lote bloqueado' : 'Lote disponível', 'success')
        fecharModal()
        carregar()
      } catch (err) { toast('Erro: ' + err.message, 'error') }
    }

    function fecharModal() {
      document.getElementById('modal-lote').classList.add('hidden')
      _loteAtual = null
    }

    function abrirEdicao() {
      if (!_loteAtual) return
      document.getElementById('edit-numero').value = _loteAtual.numero || ''
      document.getElementById('edit-metragem').value = _loteAtual.metragem || ''
      document.getElementById('edit-quadra').value = _loteAtual.quadra || ''
      document.getElementById('edit-status').value = _loteAtual.status || 'disponivel'
      document.getElementById('edit-observacao').value = _loteAtual.observacao || ''
      document.getElementById('modal-editar-lote').classList.remove('hidden')
    }

    function fecharEdicao() {
      document.getElementById('modal-editar-lote').classList.add('hidden')
    }

    async function salvarEdicao() {
      if (!_loteAtual) return
      const payload = {
        numero: parseInt(document.getElementById('edit-numero').value),
        metragem: parseFloat(document.getElementById('edit-metragem').value) || null,
        quadra: document.getElementById('edit-quadra').value.trim() || null,
        status: document.getElementById('edit-status').value,
        observacao: document.getElementById('edit-observacao').value.trim() || null
      }
      try {
        await sbPatch('crm_lotes', _loteAtual.id, payload)
        toast('Lote atualizado', 'success')
        fecharEdicao()
        fecharModal()
        carregar()
      } catch (err) { toast('Erro: ' + err.message, 'error') }
    }

    carregar()
  </script>
  <script src="js/sw-register.js?cb=1778772285"></script>
</body>
</html>
