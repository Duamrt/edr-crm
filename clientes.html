<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>EDR CRM — Clientes</title>
  <link rel="stylesheet" href="css/tokens.css?cb=1779124762">
  <link rel="stylesheet" href="css/style.css?cb=1779124762">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link rel="prefetch" href="kanban.html">
  <link rel="prefetch" href="lotes.html">
  <link rel="prefetch" href="familia.html">
  <script>
    // Auth guard: bloqueia FOUC antes do render
    document.documentElement.style.visibility = 'hidden'
  </script>
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo"><span class="brand-logo">E</span><div><div class="logo-title">EDR CRM</div><div class="logo-sub">Gestão MCMV</div></div></div>
      <div class="sidebar-nav">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="clientes.html" class="active">👥 Clientes</a>
        <a href="kanban.html">📋 Kanban</a>
        <a href="lotes.html">🏘️ Lotes</a>
      </div>
      <div class="sidebar-footer"><div id="sidebar-usuario"></div><div id="crm-versao-footer" class="crm-versao"></div></div>
    </nav>

    <div class="main">
      <div class="topbar">
        <span class="topbar-title">Clientes cadastrados</span>
        <div class="flex gap-8">
          <a href="familia.html" class="btn btn-primary btn-sm">+ Novo cliente</a>
          <button onclick="logout()" class="btn btn-secondary btn-sm">Sair</button>
        </div>
      </div>

      <div class="page-content">
        <!-- Filtros -->
        <div class="filtros-bar">
          <input type="search" id="busca" placeholder="🔍 Buscar por nome ou CPF..." oninput="filtrar()">
          <select id="filtro-status" onchange="filtrar()">
            <option value="">Todos os status</option>
            <option value="triagem">Triagem</option>
            <option value="documentacao">Documentação</option>
            <option value="correspondente">Com Correspondente</option>
            <option value="aprovado">Aprovado/Ajustes</option>
            <option value="prefeitura">Prefeitura/Projetos</option>
            <option value="assinatura">Assinatura</option>
            <option value="concluido">Concluído</option>
            <option value="perdido">Perdido</option>
          </select>
          <select id="filtro-impedimento" onchange="filtrar()">
            <option value="">Com e sem impedimento</option>
            <option value="sim">Com impedimento ativo</option>
            <option value="nao">Sem impedimento</option>
          </select>
          <select id="filtro-prioridade" onchange="filtrar()">
            <option value="">Todas as prioridades</option>
            <option value="cobrar_hoje">🔥 Cobrar hoje (críticas)</option>
            <option value="em_dia">✓ Em dia</option>
          </select>
          <span id="contador" class="text-sm text-muted"></span>
        </div>

        <!-- Tabela -->
        <div class="card" style="padding:0;">
          <div class="table-wrap">
            <table id="tabela-clientes">
              <thead>
                <tr>
                  <th class="th-sort" data-sort="nome">Nome <span class="sort-ind"></span></th>
                  <th>CPF</th>
                  <th>Telefone</th>
                  <th class="th-sort" data-sort="faixa_mcmv">Faixa <span class="sort-ind"></span></th>
                  <th>Lote</th>
                  <th class="th-sort" data-sort="status_kanban">Status <span class="sort-ind"></span></th>
                  <th class="th-sort" data-sort="ultima_atualizacao">Alerta <span class="sort-ind"></span></th>
                  <th>Próxima ação</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>

        <div id="vazio" class="hidden text-center text-muted" style="padding:40px;">
          Nenhuma família encontrada.
        </div>
      </div>
    </div>
  </div>

  <div id="loading" class="hidden"><div class="spinner"></div></div>

  <script src="js/supabase.js?cb=1779124762"></script>
  <script src="js/auth.js?cb=1779124762"></script>
  <script src="js/utils.js?cb=1779124762"></script>
  <script>
    // Auth guard
    if (!authGuard()) throw new Error('not auth')
    document.documentElement.style.visibility = ''

    const u = getUsuario()
    document.getElementById('sidebar-usuario').textContent = u?.nome || u?.email || ''

    let _todos = []
    let _sortCol = null    // coluna ativa de ordenação
    let _sortDir = 1       // 1 asc, -1 desc

    function aplicarSort(lista) {
      if (!_sortCol) return lista
      const col = _sortCol
      return [...lista].sort((a, b) => {
        const va = a[col] ?? ''
        const vb = b[col] ?? ''
        if (col === 'ultima_atualizacao') {
          return _sortDir * (new Date(va) - new Date(vb))
        }
        if (typeof va === 'number' || typeof vb === 'number') {
          return _sortDir * ((Number(va) || 0) - (Number(vb) || 0))
        }
        return _sortDir * String(va).localeCompare(String(vb), 'pt-BR')
      })
    }

    function atualizarIndSort() {
      document.querySelectorAll('.th-sort').forEach(th => {
        const ind = th.querySelector('.sort-ind')
        if (!ind) return
        if (th.dataset.sort === _sortCol) {
          ind.textContent = _sortDir === 1 ? ' ↑' : ' ↓'
          th.classList.add('th-sort-active')
        } else {
          ind.textContent = ''
          th.classList.remove('th-sort-active')
        }
      })
    }

    document.addEventListener('click', e => {
      const th = e.target.closest('.th-sort')
      if (!th) return
      const col = th.dataset.sort
      if (_sortCol === col) {
        _sortDir = -_sortDir
      } else {
        _sortCol = col
        _sortDir = 1
      }
      atualizarIndSort()
      filtrar()
    })

    async function carregar() {
      showLoading()
      try {
        const [clientes, imps, tarefas] = await Promise.all([
          sbGet('crm_clientes', '?deleted_at=is.null&order=ultima_atualizacao.desc&select=id,nome,cpf,telefone,faixa_mcmv,status_kanban,ultima_atualizacao,lote_id,crm_lotes(numero)'),
          sbGet('crm_impedimentos', '?ativo=eq.true&select=cliente_id'),
          sbGet('crm_tarefas', '?concluida=eq.false&order=prazo.asc&select=cliente_id,descricao,prazo')
        ])
        const impSet = new Set(imps.map(i => i.cliente_id))
        const tarefaMap = {}
        tarefas.forEach(t => { if (!tarefaMap[t.cliente_id]) tarefaMap[t.cliente_id] = t })

        _todos = clientes.map(c => ({
          ...c,
          temImpedimento: impSet.has(c.id),
          tarefa: tarefaMap[c.id] || null
        }))

        // Prioridade: ativos primeiro → inativos 5d+ → bloqueados por impedimento
        _todos.sort((a, b) => {
          const pa = a.temImpedimento ? 2 : (diasDesde(a.ultima_atualizacao) >= 5 ? 1 : 0)
          const pb = b.temImpedimento ? 2 : (diasDesde(b.ultima_atualizacao) >= 5 ? 1 : 0)
          if (pa !== pb) return pa - pb
          return new Date(b.ultima_atualizacao) - new Date(a.ultima_atualizacao)
        })

        // Aplica filtro se algum select estiver setado (ex: vindo de URL param)
        filtrar()
      } catch (err) {
        toast('Erro ao carregar: ' + traduzirErro(err), 'error')
      }
      hideLoading()
    }

    function renderTabela(lista) {
      const tbody = document.getElementById('tbody')
      const vazio = document.getElementById('vazio')
      document.getElementById('contador').textContent = lista.length + ' família(s)'

      if (!lista.length) {
        tbody.innerHTML = ''
        vazio.classList.remove('hidden')
        return
      }
      vazio.classList.add('hidden')

      tbody.innerHTML = lista.map(c => {
        const sla = slaBadge(c.ultima_atualizacao)
        const loteNum = c.crm_lotes?.numero ? `Lote ${c.crm_lotes.numero}` : '—'
        const tarefaTxt = c.tarefa ? `${c.tarefa.descricao} · ${fmtData(c.tarefa.prazo)}` : ''
        const tarefa = c.tarefa
          ? `<span class="${new Date(c.tarefa.prazo) < new Date() ? 'text-danger' : ''}" title="${tarefaTxt.replace(/"/g,'&quot;')}">${tarefaTxt}</span>`
          : '<span class="text-muted text-sm">—</span>'
        const impBadge = c.temImpedimento
          ? '<span class="badge badge-red">🚨 Trava</span>'
          : ''
        const nomeEsc = c.nome.replace(/"/g,'&quot;')

        return `<tr>
          <td><a href="ficha.html?id=${c.id}" class="font-bold" style="text-decoration:none;color:inherit;">${c.nome}</a></td>
          <td class="text-sm"><span class="cpf-masked" data-cpf-masked data-cliente-id="${c.id}" data-cpf-contexto="listagem" title="Clique para revelar (registrado no log de acesso)">${fmtCpfMasked(c.cpf)}</span></td>
          <td class="text-sm">${fmtTel(c.telefone)}</td>
          <td>${pillFaixa(c.faixa_mcmv) || '—'}</td>
          <td class="text-sm">${loteNum}</td>
          <td><span class="badge status-${c.status_kanban}">${KANBAN_LABEL[c.status_kanban] || c.status_kanban}</span></td>
          <td>${sla}${impBadge}</td>
          <td class="col-proxima">${tarefa}</td>
          <td class="col-acoes">
            <a href="ficha.html?id=${c.id}" class="btn btn-secondary btn-sm">Ver</a>
            <a href="familia.html?id=${c.id}" class="btn btn-secondary btn-sm">Editar</a>
            <button onclick="excluirFamilia('${c.id}', this.dataset.nome)" data-nome="${nomeEsc}" class="btn btn-danger btn-sm" title="Arquivar família">🗑️</button>
          </td>
        </tr>`
      }).join('')
    }

    async function excluirFamilia(id, nome) {
      if (!confirm(`Arquivar família "${nome}"?\n\nA família sai da lista, libera o lote automaticamente e a pasta no Google Drive é preservada. Pode ser recuperada depois via banco se precisar.`)) return
      try {
        await sbPatch('crm_clientes', id, { deleted_at: new Date().toISOString() })
        await sbPost('crm_historico', {
          cliente_id: id,
          descricao: `Família arquivada por ${getUsuario()?.nome || 'usuário'}`,
          tipo: 'sistema'
        })
        toast('Família arquivada', 'success')
        carregar()
      } catch (err) {
        toast('Erro ao arquivar: ' + traduzirErro(err), 'error')
      }
    }

    function filtrar() {
      const busca = document.getElementById('busca').value.toLowerCase().trim()
      const status = document.getElementById('filtro-status').value
      const imp = document.getElementById('filtro-impedimento').value
      const prio = document.getElementById('filtro-prioridade').value

      let lista = _todos.filter(c => {
        const matchBusca = !busca
          || c.nome.toLowerCase().includes(busca)
          || c.cpf.replace(/\D/g,'').includes(busca.replace(/\D/g,''))
        const matchStatus = !status || c.status_kanban === status
        const matchImp = !imp
          || (imp === 'sim' && c.temImpedimento)
          || (imp === 'nao' && !c.temImpedimento)

        // Filtro de prioridade — usa SLA por etapa de utils.js
        let matchPrio = true
        if (prio) {
          const dias = diasDesde(c.ultima_atualizacao) || 0
          const grav = slaGravidade(c.status_kanban, dias)
          const naoTerminal = c.status_kanban !== 'concluido' && c.status_kanban !== 'perdido'
          if (prio === 'cobrar_hoje') {
            matchPrio = naoTerminal && (grav === 'red' || grav === 'yellow')
          } else if (prio === 'em_dia') {
            matchPrio = naoTerminal && grav === 'green'
          }
        }

        return matchBusca && matchStatus && matchImp && matchPrio
      })

      lista = aplicarSort(lista)
      renderTabela(lista)
    }

    // Suporta URL param: ?prioridade=cobrar_hoje (vindo do dashboard)
    const urlParams = new URLSearchParams(window.location.search)
    const prioParam = urlParams.get('prioridade')
    if (prioParam) {
      document.getElementById('filtro-prioridade').value = prioParam
    }

    carregar()
  </script>
  <script src="js/sw-register.js?cb=1779124762"></script>
</body>
</html>
