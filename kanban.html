<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>EDR CRM — Kanban Esteira MCMV</title>
  <link rel="stylesheet" href="css/tokens.css?cb=1779124762">
  <link rel="stylesheet" href="css/style.css?cb=1779124762">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link rel="prefetch" href="clientes.html">
  <link rel="prefetch" href="lotes.html">
  <link rel="prefetch" href="ficha.html">
  <script>document.documentElement.style.visibility = 'hidden'</script>
  <style>
    /* Modo seleção múltipla (Bulk Action) */
    .kanban-bulk-bar{
      position:fixed;bottom:0;left:var(--sidebar-width);right:0;
      background:var(--sidebar-bg);
      border-top:1px solid var(--sidebar-border);
      box-shadow:0 -4px 16px rgba(0,0,0,.06);
      padding:14px 24px;
      display:flex;align-items:center;gap:14px;flex-wrap:wrap;
      z-index:150;
      transform:translateY(110%);transition:transform .18s ease;
    }
    .kanban-bulk-bar.show{transform:translateY(0)}
    .kanban-bulk-count{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.95rem;color:var(--text-primary)}
    .kanban-bulk-count b{color:var(--verde);font-size:1.1rem}
    .kanban-bulk-bar select{padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:.88rem;font-family:inherit;background:#fff;cursor:pointer;color:var(--text-primary);min-width:180px}
    .kanban-bulk-bar .grow{flex:1}
    .kanban-card.bulk-selected{outline:3px solid var(--verde);outline-offset:1px;background:var(--verde-surface)!important}
    .kanban-card.bulk-mode{cursor:pointer}
    body.bulk-mode .kanban-card{user-select:none}
    body.bulk-mode .kanban-wrap{padding-bottom:80px}
    @media (max-width:780px){.kanban-bulk-bar{left:0}}
  </style>
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar">
      <div class="sidebar-logo"><span class="brand-logo">E</span><div><div class="logo-title">EDR CRM</div><div class="logo-sub">Gestão MCMV</div></div></div>
      <div class="sidebar-nav">
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="clientes.html">👥 Clientes</a>
        <a href="kanban.html" class="active">📋 Kanban</a>
        <a href="lotes.html">🏘️ Lotes</a>
      </div>
      <div class="sidebar-footer"><div id="sidebar-usuario"></div><div id="crm-versao-footer" class="crm-versao"></div></div>
    </nav>

    <div class="main">
      <div class="topbar">
        <span class="topbar-title">Esteira MCMV</span>
        <div class="flex gap-8">
          <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text-secondary);cursor:pointer;user-select:none;">
            <input type="checkbox" id="toggle-finalizados" style="cursor:pointer;"> Mostrar finalizados
          </label>
          <button id="btn-modo-selecao" onclick="toggleModoSelecao()" class="btn btn-secondary btn-sm" title="Selecionar várias famílias e aplicar ação em lote">☑ Selecionar várias</button>
          <a href="familia.html" class="btn btn-primary btn-sm">+ Nova família</a>
          <button onclick="logout()" class="btn btn-secondary btn-sm">Sair</button>
        </div>
      </div>

      <div class="page-content" style="padding-bottom:32px;">
        <div class="kanban-legenda">
          <span class="legenda-item"><span class="legenda-cor legenda-impedimento"></span> 🚨 Impedimento ativo</span>
          <span class="legenda-item"><span class="legenda-cor legenda-recusado"></span> 🚫 Documento recusado</span>
          <span class="legenda-item"><span class="legenda-cor legenda-sla"></span> ⏱ SLA vencendo</span>
          <span class="legenda-item text-muted">· Arraste cards entre colunas pra mover na esteira</span>
        </div>
        <div class="kanban-wrap" id="kanban-wrap"></div>
      </div>
    </div>
  </div>

  <!-- Barra de ações em lote (Bulk Action — Auto #9) -->
  <div class="kanban-bulk-bar" id="bulk-bar">
    <span class="kanban-bulk-count"><b id="bulk-count">0</b> família(s) selecionada(s)</span>
    <span class="text-muted text-sm">·</span>
    <span class="text-muted text-sm">Mover para:</span>
    <select id="bulk-status">
      <option value="">— Escolha a coluna —</option>
      <option value="triagem">Triagem</option>
      <option value="documentacao">Documentação</option>
      <option value="correspondente">Com Correspondente</option>
      <option value="aprovado">Aprovado/Ajustes</option>
      <option value="prefeitura">Prefeitura/Projetos</option>
      <option value="assinatura">Assinatura</option>
      <option value="concluido">Concluído</option>
      <option value="perdido">Perdido</option>
    </select>
    <button onclick="aplicarMoverBulk()" class="btn btn-primary btn-sm">Aplicar</button>
    <span class="grow"></span>
    <button onclick="toggleModoSelecao()" class="btn btn-secondary btn-sm">Cancelar</button>
  </div>

  <div id="loading" class="hidden"><div class="spinner"></div></div>

  <script src="js/supabase.js?cb=1779124762"></script>
  <script src="js/auth.js?cb=1779124762"></script>
  <script src="js/utils.js?cb=1779124762"></script>
  <script src="js/data/clientes.js?cb=1779124762"></script>
  <script>
    if (!authGuard()) throw new Error('not auth')
    document.documentElement.style.visibility = ''

    const u = getUsuario()
    document.getElementById('sidebar-usuario').textContent = u?.nome || u?.email || ''

    const COLUNAS = [
      { id: 'triagem', label: 'Triagem' },
      { id: 'documentacao', label: 'Documentação' },
      { id: 'correspondente', label: 'Com Correspondente' },
      { id: 'aprovado', label: 'Aprovado/Ajustes' },
      { id: 'prefeitura', label: 'Prefeitura/Projetos' },
      { id: 'assinatura', label: 'Assinatura' },
      { id: 'concluido', label: 'Concluído' },
      { id: 'perdido', label: 'Perdido' }
    ]

    let _dragging = null
    let _recusadoSet = new Set()
    let _impSet = new Set()
    let _triagemBloqSet = new Set()  // clientes BLOQUEADOS pelo Triador (CADMUT, renda fora, sem renda)
    let _clientesAtuais = []           // bulk action — fonte de verdade pra status anterior + nome
    let _modoSelecao = false           // bulk action — modo seleção ativo
    let _selecionados = new Set()      // bulk action — IDs marcados
    // ETAPAS_BLOQUEADAS_AVANCO e podeAvancarEtapa() agora vivem em utils.js (fonte única)

    async function carregar() {
      showLoading()
      try {
        const [clientes, imps, tarefas, recusados] = await Promise.all([
          sbGet('crm_clientes', '?deleted_at=is.null&order=ultima_atualizacao.asc&select=id,nome,status_kanban,ultima_atualizacao,lote_id,faixa_mcmv,renda_total_confirmada,renda_total_simulada,crm_lotes(numero)'),
          sbGet('crm_impedimentos', '?ativo=eq.true&select=cliente_id,tipo'),
          sbGet('crm_tarefas', '?concluida=eq.false&order=prazo.asc&select=cliente_id,descricao,prazo'),
          sbGet('crm_documentos', '?status=eq.recusado&select=cliente_id')
        ])
        _impSet = new Set(imps.map(i => i.cliente_id))
        _recusadoSet = new Set(recusados.map(d => d.cliente_id))

        // Triador BLOQUEADO via wrapper compartilhado em utils.js (fonte única — isTriagemBloqueadaSimples)
        const impsPorCliente = new Map()
        imps.forEach(i => {
          if (!impsPorCliente.has(i.cliente_id)) impsPorCliente.set(i.cliente_id, [])
          impsPorCliente.get(i.cliente_id).push(i)
        })
        _triagemBloqSet = new Set()
        clientes.forEach(c => {
          if (isTriagemBloqueadaSimples(c, impsPorCliente.get(c.id) || [])) {
            _triagemBloqSet.add(c.id)
          }
        })

        const tarefaMap = {}
        tarefas.forEach(t => { if (!tarefaMap[t.cliente_id]) tarefaMap[t.cliente_id] = t })

        _clientesAtuais = clientes
        renderKanban(clientes, _impSet, tarefaMap)
      } catch (err) {
        toast('Erro ao carregar: ' + traduzirErro(err), 'error')
      }
      hideLoading()
    }

    function renderKanban(clientes, impSet, tarefaMap) {
      const wrap = document.getElementById('kanban-wrap')
      wrap.innerHTML = ''

      const mostrarFinalizados = localStorage.getItem('kanban_mostrar_finalizados') === '1'
      const colunasVisiveis = mostrarFinalizados
        ? COLUNAS
        : COLUNAS.filter(c => c.id !== 'concluido' && c.id !== 'perdido')

      colunasVisiveis.forEach(col => {
        const cards = clientes.filter(c => c.status_kanban === col.id)

        const colEl = document.createElement('div')
        colEl.className = 'kanban-col'
        colEl.dataset.status = col.id
        colEl.innerHTML = `
          <div class="kanban-col-header">
            <span class="kanban-col-title">${col.label}</span>
            <span class="kanban-count">${cards.length}</span>
          </div>
        `

        if (cards.length === 0) {
          const empty = document.createElement('div')
          empty.className = 'kanban-col-empty'
          empty.textContent = col.id === 'perdido' ? 'Sem perdas' : col.id === 'concluido' ? 'Sem concluídos' : 'Arraste cards aqui'
          colEl.appendChild(empty)
        }

        cards.forEach(c => {
          const hasImp = impSet.has(c.id)
          const hasRecusado = _recusadoSet.has(c.id)
          const tarefa = tarefaMap[c.id]
          const lote = c.crm_lotes?.numero ? `Lote ${c.crm_lotes.numero}` : '—'

          // Classifica SLA + badges via função única (compartilhada com clientes.html)
          const sla = classificarSlaCard(c, { temImpedimento: hasImp, temRecusado: hasRecusado, contexto: 'kanban' })
          const slaClass = sla.slaClass
          const badges = sla.badges.map(b => `<span class="badge badge-${b.tipo}">${b.texto}</span>`)

          const card = document.createElement('div')
          const isBulkSel = _modoSelecao && _selecionados.has(c.id)
          card.className = `kanban-card ${hasImp ? 'has-impedimento' : ''} ${hasRecusado ? 'has-recusado' : ''} ${slaClass} ${_modoSelecao ? 'bulk-mode' : ''} ${isBulkSel ? 'bulk-selected' : ''}`
          card.draggable = !_modoSelecao
          card.dataset.id = c.id
          const tarefaTxt = tarefa ? '📋 ' + escapeHtml(tarefa.descricao.substring(0,35)) + ' · ' + fmtData(tarefa.prazo) : '<span class="text-muted">Sem próxima ação</span>'
          card.innerHTML = `
            <div class="kanban-card-nome">${escapeHtml(c.nome)}${c.faixa_mcmv ? ' ' + pillFaixa(c.faixa_mcmv, { compact: true, size: 'sm' }) : ''}</div>
            <div class="kanban-card-lote">${escapeHtml(lote)}</div>
            ${badges.length ? `<div class="kanban-card-badges">${badges.join('')}</div>` : ''}
            <div class="kanban-card-acao">${tarefaTxt}</div>
          `

          card.addEventListener('click', () => {
            if (_modoSelecao) {
              if (_selecionados.has(c.id)) { _selecionados.delete(c.id); card.classList.remove('bulk-selected') }
              else { _selecionados.add(c.id); card.classList.add('bulk-selected') }
              _atualizarBulkBar()
              return
            }
            window.location.href = `ficha.html?id=${c.id}`
          })

          if (!_modoSelecao) {
            card.addEventListener('dragstart', e => {
              _dragging = c.id
              card.classList.add('dragging')
              e.dataTransfer.effectAllowed = 'move'
            })
            card.addEventListener('dragend', () => {
              card.classList.remove('dragging')
              _dragging = null
            })
          }

          colEl.appendChild(card)
        })

        // Drop zone
        colEl.addEventListener('dragover', e => {
          e.preventDefault()
          colEl.classList.add('drag-over')
        })
        colEl.addEventListener('dragleave', () => colEl.classList.remove('drag-over'))
        colEl.addEventListener('drop', async e => {
          e.preventDefault()
          colEl.classList.remove('drag-over')
          const clienteId = _dragging
          if (!clienteId) return
          const novoStatus = colEl.dataset.status

          // Validação unificada: doc recusado, impedimento ativo, OU triagem bloqueada (pra Documentação)
          const check = podeAvancarEtapa(novoStatus, {
            temDocRecusado: _recusadoSet.has(clienteId),
            temImpedimentoAtivo: _impSet.has(clienteId),
            triagemBloqueada: _triagemBloqSet.has(clienteId)
          })
          if (!check.ok) { toast(check.motivo, 'error'); return }

          try {
            await moverStatusKanban(clienteId, novoStatus)
            carregar()
          } catch (err) {
            toast('Erro ao mover: ' + traduzirErro(err), 'error')
          }
        })

        wrap.appendChild(colEl)
      })
    }

    // ── Bulk Action (Auto #9) ────────────────────────────────────
    function toggleModoSelecao() {
      _modoSelecao = !_modoSelecao
      _selecionados.clear()
      document.body.classList.toggle('bulk-mode', _modoSelecao)
      document.getElementById('bulk-bar').classList.toggle('show', _modoSelecao)
      const btn = document.getElementById('btn-modo-selecao')
      btn.textContent = _modoSelecao ? '✕ Sair do modo seleção' : '☑ Selecionar várias'
      btn.classList.toggle('btn-secondary', !_modoSelecao)
      btn.classList.toggle('btn-danger', _modoSelecao)
      _atualizarBulkBar()
      carregar()
    }

    function _atualizarBulkBar() {
      document.getElementById('bulk-count').textContent = _selecionados.size
    }

    async function aplicarMoverBulk() {
      const novoStatus = document.getElementById('bulk-status').value
      if (!novoStatus) { toast('Escolha a coluna de destino', 'error'); return }
      if (_selecionados.size === 0) { toast('Selecione pelo menos 1 família', 'error'); return }

      // Validar quais podem avançar
      const validos = []
      const bloqueados = []
      _selecionados.forEach(id => {
        const c = _clientesAtuais.find(x => x.id === id)
        if (!c) return
        if (c.status_kanban === novoStatus) return  // já tá lá, pula
        const check = podeAvancarEtapa(novoStatus, {
          temDocRecusado: _recusadoSet.has(id),
          temImpedimentoAtivo: _impSet.has(id),
          triagemBloqueada: _triagemBloqSet.has(id)
        })
        if (check.ok) validos.push({ id, statusAnterior: c.status_kanban, nome: c.nome })
        else bloqueados.push({ nome: c.nome, motivo: check.motivo })
      })

      if (validos.length === 0) {
        const msg = bloqueados.length ? `Nenhuma pode mover. ${bloqueados[0].motivo}` : 'Todas as selecionadas já estão nessa coluna'
        toast(msg, 'error')
        return
      }

      showLoading()
      let sucesso = 0, erro = 0
      await Promise.all(validos.map(async v => {
        try { await moverStatusKanban(v.id, novoStatus); sucesso++ }
        catch (err) { erro++; console.warn('Bulk move falhou:', v.id, err) }
      }))
      hideLoading()

      // Sair do modo + recarregar
      _modoSelecao = false
      _selecionados.clear()
      document.body.classList.remove('bulk-mode')
      document.getElementById('bulk-bar').classList.remove('show')
      const btn = document.getElementById('btn-modo-selecao')
      btn.textContent = '☑ Selecionar várias'
      btn.classList.remove('btn-danger')
      btn.classList.add('btn-secondary')

      // Toast com undo (reverte só os que deram sucesso)
      const lbl = KANBAN_LABEL[novoStatus] || novoStatus
      const aviso = bloqueados.length
        ? `${sucesso} movida(s) pra ${lbl} · ${bloqueados.length} bloqueada(s)`
        : `${sucesso} movida(s) pra ${lbl}`
      if (sucesso > 0) {
        toastUndo(aviso, async () => {
          showLoading()
          await Promise.all(validos.slice(0, sucesso).map(v => moverStatusKanban(v.id, v.statusAnterior).catch(()=>{})))
          hideLoading()
          toast('Movimentação revertida', 'success')
          carregar()
        }, { duration: 30000 })
      } else {
        toast(aviso, erro > 0 ? 'error' : 'info')
      }
      carregar()
    }

    // Toggle "Mostrar finalizados" — persiste em localStorage
    const _toggleFin = document.getElementById('toggle-finalizados')
    _toggleFin.checked = localStorage.getItem('kanban_mostrar_finalizados') === '1'
    _toggleFin.addEventListener('change', () => {
      localStorage.setItem('kanban_mostrar_finalizados', _toggleFin.checked ? '1' : '0')
      carregar()
    })

    carregar()
  </script>
  <script src="js/sw-register.js?cb=1779124762"></script>
</body>
</html>
